<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU Benchmark · Adaptive Visual</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--mono:'IBM Plex Mono',monospace;--display:'Bebas Neue',sans-serif}
body{background:#000;color:#fff;font-family:var(--mono);overflow:hidden;height:100vh;width:100vw}

/* ── SCAN SCREEN ── */
#scan{
  position:fixed;inset:0;z-index:100;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
}
#scan.done{pointer-events:none;animation:scanOut .7s ease .2s both}
@keyframes scanOut{to{opacity:0;transform:scale(1.03)}}

.scan-title{font-family:var(--display);font-size:clamp(48px,10vw,110px);letter-spacing:.04em;
  color:#fff;line-height:1;margin-bottom:32px}
.scan-line{width:min(480px,90vw);height:1px;background:rgba(255,255,255,.08);position:relative;margin:6px 0}
.scan-line-fill{position:absolute;top:0;left:0;height:100%;background:#fff;width:0%;transition:width .5s ease}
.scan-key{font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.3);margin-top:4px;display:flex;justify-content:space-between;width:min(480px,90vw)}
.scan-val{font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.6);text-align:right}
.scan-verdict{
  margin-top:40px;font-family:var(--display);font-size:clamp(32px,7vw,80px);
  letter-spacing:.08em;opacity:0;transition:opacity .4s;
}
#scan-spinner{
  width:32px;height:32px;border:1.5px solid rgba(255,255,255,.1);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:32px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CANVAS PRINCIPAL ── */
#main-canvas{position:fixed;inset:0;width:100%;height:100%;display:none}

/* ── HUD ── */
#hud{
  position:fixed;inset:0;pointer-events:none;z-index:10;
  display:none;
}
/* coin haut gauche */
.hud-tl{
  position:absolute;top:24px;left:24px;
  display:flex;flex-direction:column;gap:3px;
}
.hud-tier{
  font-family:var(--display);font-size:clamp(36px,8vw,90px);
  line-height:1;letter-spacing:.04em;
}
.hud-sub{font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.45);margin-top:4px}
.hud-desc{font-size:11px;color:rgba(255,255,255,.55);line-height:1.7;margin-top:8px;max-width:280px}

/* coin haut droit */
.hud-tr{
  position:absolute;top:24px;right:24px;text-align:right;
  display:flex;flex-direction:column;gap:6px;
}
.hud-stat{font-size:9px;letter-spacing:.14em;color:rgba(255,255,255,.4)}
.hud-stat b{color:rgba(255,255,255,.8);font-weight:600}
#hud-fps{color:rgba(255,255,255,.6)}

/* coin bas gauche */
.hud-bl{
  position:absolute;bottom:24px;left:24px;
  display:flex;gap:6px;pointer-events:all;
}
.hud-btn{
  font-family:var(--mono);font-size:9px;letter-spacing:.14em;
  padding:7px 14px;border:1px solid rgba(255,255,255,.15);
  background:transparent;color:rgba(255,255,255,.5);cursor:pointer;
  transition:all .2s;
}
.hud-btn:hover{border-color:rgba(255,255,255,.5);color:#fff}
.hud-btn.active{border-color:#fff;color:#fff;background:rgba(255,255,255,.06)}

/* coin bas droit */
.hud-br{
  position:absolute;bottom:24px;right:24px;text-align:right;
  display:flex;flex-direction:column;gap:4px;
}
.hud-meter-row{display:flex;align-items:center;gap:10px;justify-content:flex-end}
.hud-meter-lbl{font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.3);white-space:nowrap}
.hud-meter-bar{width:80px;height:2px;background:rgba(255,255,255,.08)}
.hud-meter-fill{height:100%;background:#fff;transition:width .8s ease}

/* scanlines overlay */
#scanlines{
  position:fixed;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

/* ── TIER COLORS ── */
.c-low   {color:#4ade80}
.c-mid   {color:#facc15}
.c-high  {color:#60a5fa}
.c-ultra {color:#e879f9}
</style>
</head>
<body>

<!-- SCAN SCREEN -->
<div id="scan">
  <div id="scan-spinner"></div>
  <div class="scan-title">GPU SCAN</div>
  <div id="scan-rows">
    <!-- injecté dynamiquement -->
  </div>
  <div class="scan-verdict" id="scan-verdict"></div>
</div>

<!-- SCANLINES -->
<div id="scanlines"></div>

<!-- CANVAS -->
<canvas id="main-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-tl">
    <div class="hud-tier" id="hud-tier"></div>
    <div class="hud-sub" id="hud-sub"></div>
    <div class="hud-desc" id="hud-desc"></div>
  </div>
  <div class="hud-tr">
    <div class="hud-stat" id="hud-fps">— FPS</div>
    <div class="hud-stat">GPU : <b id="hud-gpu">—</b></div>
    <div class="hud-stat">THREADS : <b id="hud-threads">—</b></div>
    <div class="hud-stat">BUF MAX : <b id="hud-buf">—</b></div>
    <div class="hud-stat">TEXTURE : <b id="hud-tex">—</b></div>
  </div>
  <div class="hud-bl" id="hud-btns"></div>
  <div class="hud-br">
    <div class="hud-meter-row">
      <div class="hud-meter-lbl">COMPUTE</div>
      <div class="hud-meter-bar"><div class="hud-meter-fill" id="m-compute" style="width:0%"></div></div>
    </div>
    <div class="hud-meter-row">
      <div class="hud-meter-lbl">MEMORY</div>
      <div class="hud-meter-bar"><div class="hud-meter-fill" id="m-memory" style="width:0%"></div></div>
    </div>
    <div class="hud-meter-row">
      <div class="hud-meter-lbl">TEXTURE</div>
      <div class="hud-meter-bar"><div class="hud-meter-fill" id="m-texture" style="width:0%"></div></div>
    </div>
  </div>
</div>

<script type="module">

/* ═══════════════════════════════════════════
   TIERS
═══════════════════════════════════════════ */
const TIERS = [
  {
    id:'low', label:'LOW-END', color:'#4ade80',
    sub:'GPU INTÉGRÉ / VIEUX MATÉRIEL',
    desc:'Rendu 2D vectoriel pur.\nCourbes de Lissajous procédurales\ngénérées frame par frame.',
    visual:'lissajous'
  },
  {
    id:'mid', label:'MID-RANGE', color:'#facc15',
    sub:'iGPU RÉCENT / GPU MOBILE',
    desc:'Plasma ondulatoire.\nChaque pixel calculé via\nfonctions trigonométriques.',
    visual:'plasma'
  },
  {
    id:'high', label:'HIGH-END', color:'#60a5fa',
    sub:'GPU DÉDIÉ ENTRÉE/MILIEU DE GAMME',
    desc:'50 000 particules en vortex.\nCompute shader + blending\nadditif — tout sur GPU.',
    visual:'vortex'
  },
  {
    id:'ultra', label:'ULTRA', color:'#e879f9',
    sub:'GPU HAUT DE GAMME',
    desc:'Ray marching temps réel.\nScène 3D complète — 0 mesh,\nzéro géométrie. Pure maths.',
    visual:'raymarcher'
  }
];

/* ═══════════════════════════════════════════
   BENCHMARK RÉEL — mesure FPS GPU par tier
   On soumet N frames et on attend que le GPU
   finisse via onSubmittedWorkDone()
═══════════════════════════════════════════ */
const BENCH_FRAMES  = 40;   // frames par test
const FPS_THRESHOLD = 95;   // fps min pour valider un tier

// ── Benchmark shader fullscreen (plasma / lissajous / raymarcher) ──
async function benchShader(device, fmt, ctx, wgsl) {
  const ub  = device.createBuffer({size:32, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
  const bgl = device.createBindGroupLayout({entries:[{binding:0,visibility:GPUShaderStage.FRAGMENT,buffer:{}}]});
  const mod = device.createShaderModule({code:wgsl});
  const pip = device.createRenderPipeline({
    layout: device.createPipelineLayout({bindGroupLayouts:[bgl]}),
    vertex:   {module:mod, entryPoint:'vs'},
    fragment: {module:mod, entryPoint:'fs', targets:[{format:fmt}]},
    primitive:{topology:'triangle-list'}
  });
  const bg = device.createBindGroup({layout:bgl,entries:[{binding:0,resource:{buffer:ub}}]});

  // warm-up : 3 frames pour chauffer le pipeline
  for(let i=0;i<3;i++){
    device.queue.writeBuffer(ub,0,new Float32Array([i*.016,800,450,1,0.5,0.8,0,0]));
    const enc=device.createCommandEncoder();
    const p=enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}]});
    p.setPipeline(pip);p.setBindGroup(0,bg);p.draw(3);p.end();
    device.queue.submit([enc.finish()]);
  }
  await device.queue.onSubmittedWorkDone();

  // mesure réelle
  const t0 = performance.now();
  for(let i=0;i<BENCH_FRAMES;i++){
    device.queue.writeBuffer(ub,0,new Float32Array([i*.016,800,450,1,0.5,0.8,0,0]));
    const enc=device.createCommandEncoder();
    const p=enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}]});
    p.setPipeline(pip);p.setBindGroup(0,bg);p.draw(3);p.end();
    device.queue.submit([enc.finish()]);
  }
  await device.queue.onSubmittedWorkDone();
  ub.destroy();
  return Math.round(BENCH_FRAMES / ((performance.now()-t0)/1000));
}

// ── Benchmark compute (vortex) ──
async function benchCompute(device, fmt, ctx) {
  const nb = 150000;
  const mb = device.createBuffer({size:8, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
  const code=`
struct P{pos:vec2f,vel:vec2f,a:f32,b:f32,c:f32,d:f32}
struct M{pos:vec2f}
@group(0)@binding(0) var<storage,read>       pin:array<P>;
@group(0)@binding(1) var<storage,read_write> pout:array<P>;
@group(0)@binding(2) var<uniform> m:M;
@compute @workgroup_size(64)
fn cp(@builtin(global_invocation_id) id:vec3u){
  var p=pin[id.x];
  let d=m.pos-p.pos;let dist=length(d);
  if(dist<0.5&&dist>0.001){p.vel+=normalize(d)*0.0004*(1.0-dist/0.5);}
  let cs=cos(0.0005);let sn=sin(0.0005);
  p.vel=vec2f(p.vel.x*cs-p.vel.y*sn,p.vel.x*sn+p.vel.y*cs);
  p.vel*=0.987;p.pos+=p.vel;
  if(p.pos.x<-1.0){p.pos.x=1.0;}if(p.pos.x>1.0){p.pos.x=-1.0;}
  if(p.pos.y<-1.0){p.pos.y=1.0;}if(p.pos.y>1.0){p.pos.y=-1.0;}
  pout[id.x]=p;
}
struct V{@builtin(position) pos:vec4f,@location(0) col:f32}
@vertex fn vs(@builtin(instance_index) i:u32,@builtin(vertex_index) v:u32)->V{
  let p=pin[i];let s=0.005+length(p.vel)*0.2;
  var uvs=array<vec2f,6>(vec2f(-1,1),vec2f(1,1),vec2f(-1,-1),vec2f(-1,-1),vec2f(1,1),vec2f(1,-1));
  return V(vec4f(p.pos+uvs[v]*s,0.0,1.0),length(p.vel)*60.0);
}
@fragment fn fs(@location(0) c:f32)->@location(0) vec4f{return vec4f(c*.3,c*.1,c,0.5);}`;
  const mod=device.createShaderModule({code});
  const bufA=device.createBuffer({size:nb*32,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
  const bufB=device.createBuffer({size:nb*32,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
  const init=new Float32Array(nb*8);
  for(let i=0;i<nb*8;i+=8){const r=Math.sqrt(Math.random())*.85,a=Math.random()*6.28;init[i]=r*Math.cos(a);init[i+1]=r*Math.sin(a);}
  device.queue.writeBuffer(bufA,0,init);
  const layout=device.createBindGroupLayout({entries:[
    {binding:0,visibility:GPUShaderStage.COMPUTE|GPUShaderStage.VERTEX,buffer:{type:'read-only-storage'}},
    {binding:1,visibility:GPUShaderStage.COMPUTE,buffer:{type:'storage'}},
    {binding:2,visibility:GPUShaderStage.COMPUTE,buffer:{type:'uniform'}}
  ]});
  const pl=device.createPipelineLayout({bindGroupLayouts:[layout]});
  const cp2=device.createComputePipeline({layout:pl,compute:{module:mod,entryPoint:'cp'}});
  const rp2=device.createRenderPipeline({
    layout:pl,vertex:{module:mod,entryPoint:'vs'},
    fragment:{module:mod,entryPoint:'fs',targets:[{format:fmt,blend:{color:{srcFactor:'src-alpha',dstFactor:'one',operation:'add'},alpha:{srcFactor:'one',dstFactor:'one-minus-src-alpha',operation:'add'}}}]},
    primitive:{topology:'triangle-list'}
  });
  const bgA2=device.createBindGroup({layout,entries:[{binding:0,resource:{buffer:bufA}},{binding:1,resource:{buffer:bufB}},{binding:2,resource:{buffer:mb}}]});
  const bgB2=device.createBindGroup({layout,entries:[{binding:0,resource:{buffer:bufB}},{binding:1,resource:{buffer:bufA}},{binding:2,resource:{buffer:mb}}]});

  // warm-up
  for(let i=0;i<3;i++){
    const bg=i%2===0?bgA2:bgB2;
    const enc=device.createCommandEncoder();
    const p1=enc.beginComputePass();p1.setPipeline(cp2);p1.setBindGroup(0,bg);p1.dispatchWorkgroups(Math.ceil(nb/64));p1.end();
    const p2=enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0,g:0,b:.02,a:1},loadOp:'clear',storeOp:'store'}]});
    p2.setPipeline(rp2);p2.setBindGroup(0,bg);p2.draw(6,nb);p2.end();
    device.queue.submit([enc.finish()]);
  }
  await device.queue.onSubmittedWorkDone();

  const t0=performance.now();
  for(let i=0;i<BENCH_FRAMES;i++){
    const bg=i%2===0?bgA2:bgB2;
    const enc=device.createCommandEncoder();
    const p1=enc.beginComputePass();p1.setPipeline(cp2);p1.setBindGroup(0,bg);p1.dispatchWorkgroups(Math.ceil(nb/64));p1.end();
    const p2=enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0,g:0,b:.02,a:1},loadOp:'clear',storeOp:'store'}]});
    p2.setPipeline(rp2);p2.setBindGroup(0,bg);p2.draw(6,nb);p2.end();
    device.queue.submit([enc.finish()]);
  }
  await device.queue.onSubmittedWorkDone();
  bufA.destroy();bufB.destroy();mb.destroy();
  return Math.round(BENCH_FRAMES/((performance.now()-t0)/1000));
}

// ── Shaders de benchmark ──
const BENCH_PLASMA=`
struct U{t:f32,rw:f32,rh:f32,cr:f32,cg:f32,cb:f32,p0:f32,p1:f32}
@group(0)@binding(0) var<uniform> u:U;
@vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{let p=array<vec2f,3>(vec2f(-4,-1),vec2f(4,-1),vec2f(0,4));return vec4f(p[i],0.0,1.0);}
@fragment fn fs(@builtin(position) fc:vec4f)->@location(0) vec4f{
  let uv=(fc.xy/vec2f(u.rw,u.rh))*2.0-vec2f(1.0);let t=u.t;
  let v=(sin(uv.x*6.+t)+sin(uv.y*6.+t*.7)+sin((uv.x+uv.y)*4.+t*.9)+sin(sqrt(uv.x*uv.x+uv.y*uv.y)*7.-t*1.2))*0.5;
  let n=v*.5+.5;return vec4f(n*.6,n*.2,n*.9,1.0);
}`;

const BENCH_LISSAJOUS=`
struct U{t:f32,rw:f32,rh:f32,cr:f32,cg:f32,cb:f32,p0:f32,p1:f32}
@group(0)@binding(0) var<uniform> u:U;
@vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{let p=array<vec2f,3>(vec2f(-4,-1),vec2f(4,-1),vec2f(0,4));return vec4f(p[i],0.0,1.0);}
fn lis(uv:vec2f,a:f32,b:f32,d:f32,t:f32)->f32{var m=9999.0;var prev=vec2f(sin(d),0.0);for(var i=1;i<=120;i++){let phi=f32(i)/120.0*6.283;let cur=vec2f(sin(a*phi+d+t*.3),sin(b*phi+t*.2));let ab=cur-prev;let ap=uv-prev;let tt=clamp(dot(ap,ab)/dot(ab,ab),0.0,1.0);m=min(m,length(ap-ab*tt));prev=cur;}return m;}
@fragment fn fs(@builtin(position) fc:vec4f)->@location(0) vec4f{
  let res=vec2f(u.rw,u.rh);let uv=(fc.xy/res*2.0-vec2f(1.0))*vec2f(res.x/res.y,1.0);
  var g=0.0;
  g+=0.01/max(lis(uv,3.,2.,0.,u.t),0.0001);
  g+=0.008/max(lis(uv,3.,4.,1.57,u.t),0.0001);
  g+=0.006/max(lis(uv,5.,4.,0.8,u.t),0.0001);
  return vec4f(clamp(g,0.,2.)*vec3f(.3,.9,.6),1.0);
}`;

const BENCH_RAYMARCH=`
struct U{t:f32,rw:f32,rh:f32,cr:f32,cg:f32,cb:f32,p0:f32,p1:f32}
@group(0)@binding(0) var<uniform> u:U;
@vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{let p=array<vec2f,3>(vec2f(-4,-1),vec2f(4,-1),vec2f(0,4));return vec4f(p[i],0.0,1.0);}
fn sdSphere(p:vec3f,r:f32)->f32{return length(p)-r;}
fn sdTorus(p:vec3f,R:f32,r:f32)->f32{return length(vec2f(length(p.xz)-R,p.y))-r;}
fn smin(a:f32,b:f32,k:f32)->f32{let h=max(k-abs(a-b),0.)/k;return min(a,b)-h*h*k*.25;}
fn map(p:vec3f)->f32{
  var d=p.y+1.2;
  let ta=u.t*.5;var tp=vec3f(p.x*cos(ta)-p.z*sin(ta),p.y,p.x*sin(ta)+p.z*cos(ta));
  d=smin(d,sdTorus(tp,.8,.22),.1);
  d=smin(d,sdSphere(p-vec3f(0.,abs(sin(u.t*.8))*.5-.3,.0),.3),.2);
  return d;
}
fn calcN(p:vec3f)->vec3f{let e=.001;return normalize(vec3f(map(p+vec3f(e,0,0))-map(p-vec3f(e,0,0)),map(p+vec3f(0,e,0))-map(p-vec3f(0,e,0)),map(p+vec3f(0,0,e))-map(p-vec3f(0,0,e))));}
@fragment fn fs(@builtin(position) fc:vec4f)->@location(0) vec4f{
  let res=vec2f(u.rw,u.rh);let uv=(fc.xy*2.-res)/res.y;
  let ro=vec3f(sin(u.t*.3)*3.5,.8,cos(u.t*.3)*3.5);
  let fwd=normalize(-ro);let rgt=normalize(cross(vec3f(0,1,0),fwd));let upv=cross(fwd,rgt);
  let rd=normalize(fwd+uv.x*rgt+uv.y*upv);
  var t2=0.0;var hit=false;
  for(var i=0;i<60;i++){let h=map(ro+rd*t2);if(h<.001){hit=true;break;}t2+=h;if(t2>20.){break;}}
  var col=vec3f(.02,.01,.05);
  if(hit){let p2=ro+rd*t2;let n=calcN(p2);let l=normalize(vec3f(2.,4.,1.));col=vec3f(.5,.15,.9)*max(dot(n,l),0.)+vec3f(.03);}
  col=col/(col+vec3f(.8));return vec4f(pow(max(col,vec3f(0.)),.vec3f(.4545)),1.0);
}`;

// ── Orchestrateur principal ──
async function runFullBenchmark(device, fmt, ctx) {
  const wrap = document.getElementById('scan-rows');

  // Phase 1 : static limits (rapide)
  const lim = (await navigator.gpu.requestAdapter({powerPreference:'high-performance'}))?.limits || {};

  // Phase 2 : benchmark tiers du plus exigeant au plus léger
  const tests = [
    { idx:3, label:'ULTRA — Ray marcher',   run: ()=>benchShader(device,fmt,ctx,BENCH_RAYMARCH)  },
    { idx:2, label:'HIGH  — Vortex 50k',    run: ()=>benchCompute(device,fmt,ctx)                },
    { idx:1, label:'MID   — Plasma shader', run: ()=>benchShader(device,fmt,ctx,BENCH_PLASMA)    },
    { idx:0, label:'LOW   — Lissajous',     run: ()=>benchShader(device,fmt,ctx,BENCH_LISSAJOUS) },
  ];

  const results = [];

  for (const test of tests) {
    // Ajoute la ligne "en cours"
    const rowId = `bench-row-${test.idx}`;
    const existing = document.getElementById(rowId);
    if (!existing) {
      wrap.insertAdjacentHTML('beforeend', `
        <div id="${rowId}" style="display:flex;justify-content:space-between;align-items:center;width:min(480px,90vw);margin:3px 0">
          <span style="font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.4)">${test.label}</span>
          <span id="bench-val-${test.idx}" style="font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.3)">TEST...</span>
        </div>
        <div class="scan-line" style="margin-bottom:2px"><div class="scan-line-fill" id="bench-bar-${test.idx}"></div></div>
      `);
    }

    const fps = await test.run();
    results.push({idx:test.idx, fps});

    // Met à jour la ligne avec le résultat
    const pass = fps >= FPS_THRESHOLD;
    const pct  = Math.min(100, Math.round(fps/120*100));
    const color = pass ? '#4ade80' : fps > 35 ? '#facc15' : '#f87171';
    document.getElementById(`bench-val-${test.idx}`).textContent = `${fps} FPS ${pass?'✓':'✗'}`;
    document.getElementById(`bench-val-${test.idx}`).style.color = color;
    document.getElementById(`bench-bar-${test.idx}`).style.cssText = `width:${pct}%;background:${color};transition:width .4s ease`;

    // Dès qu'on trouve le premier tier qui passe, c'est notre winner
    if (pass) {
      return test.idx;
    }
  }

  // Aucun tier ne passe → LOW par défaut
  return 0;
}

   MAIN
═══════════════════════════════════════════ */
async function main() {
  if (!navigator.gpu) {
    document.getElementById('scan').innerHTML = `
      <div style="font-size:14px;letter-spacing:.15em;color:rgba(255,255,255,.5)">
        WEBGPU NON SUPPORTÉ<br><br>
        <span style="font-size:11px;opacity:.5">Utilise Chrome ou Edge version récente</span>
      </div>`;
    return;
  }

  const adapter = await navigator.gpu.requestAdapter({powerPreference:'high-performance'});
  if (!adapter) return;
  const lim  = adapter.limits;
  const info = await adapter.requestAdapterInfo?.().catch(()=>({})) || {};
  const device = await adapter.requestDevice();

  // Configure le canvas principal MAINTENANT (avant le benchmark)
  const canvas = document.getElementById('main-canvas');
  canvas.style.display = 'block';
  canvas.width  = window.innerWidth  * Math.min(devicePixelRatio,2);
  canvas.height = window.innerHeight * Math.min(devicePixelRatio,2);
  const fmt = navigator.gpu.getPreferredCanvasFormat();
  const ctx = canvas.getContext('webgpu');
  ctx.configure({device, format:fmt});
  window.addEventListener('resize',()=>{
    canvas.width  = window.innerWidth  * Math.min(devicePixelRatio,2);
    canvas.height = window.innerHeight * Math.min(devicePixelRatio,2);
    ctx.configure({device,format:fmt});
  });

  // Spinner visible pendant le benchmark
  document.getElementById('scan-spinner').style.display = 'block';
  document.getElementById('scan-rows').innerHTML = `
    <div style="font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.3);margin-bottom:12px;width:min(480px,90vw);text-align:left">
      BENCHMARK GPU EN COURS — MESURE FPS RÉEL PAR TIER
    </div>`;

  // Lance le benchmark réel
  const tierIdx = await runFullBenchmark(device, fmt, ctx);
  const T = TIERS[tierIdx];

  document.getElementById('scan-spinner').style.display='none';

  // Verdict
  await new Promise(r=>setTimeout(r,400));
  const verdict = document.getElementById('scan-verdict');
  verdict.innerHTML = `<span style="font-size:clamp(12px,2vw,18px);letter-spacing:.1em;opacity:.5;display:block;margin-bottom:8px">TIER OPTIMAL DÉTECTÉ</span>${T.label}`;
  verdict.style.color   = T.color;
  verdict.style.opacity = '1';

  await new Promise(r=>setTimeout(r,1600));
  document.getElementById('scan').classList.add('done');

  // HUD
  document.getElementById('hud').style.display='block';

  document.getElementById('hud-tier').textContent = T.label;
  document.getElementById('hud-tier').style.color  = T.color;
  document.getElementById('hud-sub').textContent   = T.sub;
  document.getElementById('hud-desc').textContent  = T.desc;
  document.getElementById('hud-gpu').textContent   = info.description||info.vendor||'Détecté';
  document.getElementById('hud-threads').textContent = lim.maxComputeWorkgroupSizeX;
  document.getElementById('hud-buf').textContent   = Math.round(lim.maxStorageBufferBindingSize/1048576)+'MB';
  document.getElementById('hud-tex').textContent   = lim.maxTextureDimension2D+'px';

  setTimeout(()=>{
    document.getElementById('m-compute').style.width = Math.min(100, lim.maxComputeWorkgroupSizeX/1024*100)+'%';
    document.getElementById('m-memory').style.width  = Math.min(100, lim.maxStorageBufferBindingSize/2147483648*100)+'%';
    document.getElementById('m-texture').style.width = Math.min(100, lim.maxTextureDimension2D/16384*100)+'%';
  }, 200);

  // Boutons switch
  const btnsEl = document.getElementById('hud-btns');
  btnsEl.innerHTML = TIERS.map((t,i)=>`
    <button class="hud-btn${i===tierIdx?' active':''}"
      style="${i===tierIdx?`border-color:${t.color};color:${t.color}`:''}"
      data-tier="${i}">${t.label}</button>
  `).join('');

  let currentRenderer = null;

  async function launch(idx) {
    if (currentRenderer) { currentRenderer.stop(); currentRenderer=null; }
    const t = TIERS[idx];
    document.getElementById('hud-tier').textContent = t.label;
    document.getElementById('hud-tier').style.color  = t.color;
    document.getElementById('hud-sub').textContent   = t.sub;
    document.getElementById('hud-desc').textContent  = t.desc;
    btnsEl.querySelectorAll('.hud-btn').forEach((b,bi)=>{
      b.className='hud-btn'+(bi===idx?' active':'');
      b.style.borderColor = bi===idx?t.color:'';
      b.style.color       = bi===idx?t.color:'';
    });
    // Passe ctx et fmt déjà configurés
    switch(t.visual) {
      case 'lissajous':  currentRenderer = await renderLissajous(canvas, device, t.color, ctx, fmt); break;
      case 'plasma':     currentRenderer = await renderPlasma(canvas, device, t.color, ctx, fmt);    break;
      case 'vortex':     currentRenderer = await renderVortex(canvas, device, t.color, ctx, fmt);    break;
      case 'raymarcher': currentRenderer = await renderRaymarcher(canvas, device, t.color, ctx, fmt);break;
    }
  }

  btnsEl.addEventListener('click', e=>{
    const btn = e.target.closest('.hud-btn');
    if (btn) launch(parseInt(btn.dataset.tier));
  });

  launch(tierIdx);
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function resizeCanvas(canvas) {
  canvas.width  = window.innerWidth  * Math.min(devicePixelRatio,2);
  canvas.height = window.innerHeight * Math.min(devicePixelRatio,2);
}

function makeFmt(device, canvas) {
  const fmt = navigator.gpu.getPreferredCanvasFormat();
  // Le canvas est déjà configuré par main() — on récupère juste le contexte existant
  const ctx = canvas.getContext('webgpu');
  if (!canvas._gpuReady) {
    resizeCanvas(canvas);
    ctx.configure({device, format:fmt});
    canvas._gpuReady = true;
  }
  return {ctx, fmt};
}

function fpsLoop(cb) {
  let alive=true, last=0, smooth=60;
  function frame(ts) {
    if (!alive) return;
    const dt=ts-last||16; last=ts; smooth=smooth*.9+(1000/dt)*.1;
    document.getElementById('hud-fps').textContent=Math.round(smooth)+' FPS';
    cb(ts);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  return { stop(){ alive=false; } };
}

function fullscreenPipeline(device, fmt, wgsl, unifSize) {
  const ub  = device.createBuffer({size:unifSize, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
  const mod = device.createShaderModule({code:wgsl});
  const bgl = device.createBindGroupLayout({entries:[
    {binding:0,visibility:GPUShaderStage.FRAGMENT,buffer:{}}
  ]});
  const bg  = device.createBindGroup({layout:bgl,entries:[{binding:0,resource:{buffer:ub}}]});
  const pip = device.createRenderPipeline({
    layout: device.createPipelineLayout({bindGroupLayouts:[bgl]}),
    vertex: {module:mod, entryPoint:'vs'},
    fragment:{module:mod,entryPoint:'fs',targets:[{format:fmt}]},
    primitive:{topology:'triangle-list'}
  });
  return {ub, pip, bg};
}

/* ═══════════════════════════════════════════
   TIER LOW — LISSAJOUS
   Courbes vectorielles 2D, canvas 2D + timer
   (GPU minimal, compute pas nécessaire)
═══════════════════════════════════════════ */
async function renderLissajous(canvas, device, accentColor, ctx, fmt) {
  const col=[parseInt(accentColor.slice(1,3),16)/255,parseInt(accentColor.slice(3,5),16)/255,parseInt(accentColor.slice(5,7),16)/255];

  const wgsl=`
struct U{time:f32,rw:f32,rh:f32,cr:f32,cg:f32,cb:f32,p0:f32,p1:f32}
@group(0)@binding(0) var<uniform> u:U;

@vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{
  let p=array<vec2f,3>(vec2f(-4,-1),vec2f(4,-1),vec2f(0,4));
  return vec4f(p[i],0.0,1.0);
}

fn lissajous(uv:vec2f, a:f32, b:f32, delta:f32, t:f32) -> f32 {
  // Distance minimale du pixel à la courbe de Lissajous
  var minD = 9999.0;
  var prev = vec2f(sin(delta), sin(0.0));
  for(var i=1; i<=180; i++){
    let phi = f32(i)/180.0 * 6.28318;
    let cur = vec2f(sin(a*phi + delta + t*0.3), sin(b*phi + t*0.2));
    // distance segment prev->cur
    let ab = cur - prev;
    let ap = uv - prev;
    let tt = clamp(dot(ap,ab)/dot(ab,ab), 0.0, 1.0);
    let d = length(ap - ab*tt);
    minD = min(minD, d);
    prev = cur;
  }
  return minD;
}

@fragment fn fs(@builtin(position) fc:vec4f)->@location(0) vec4f{
  let res = vec2f(u.rw, u.rh);
  let uv  = (fc.xy / res * 2.0 - vec2f(1.0)) * vec2f(res.x/res.y, 1.0);
  let t   = u.time;

  var glow = 0.0;

  // 5 courbes de Lissajous avec paramètres différents
  let pairs = array<vec4f, 5>(
    vec4f(3.0, 2.0, 0.0,   1.0),
    vec4f(3.0, 4.0, 1.57,  0.85),
    vec4f(5.0, 4.0, 0.8,   0.65),
    vec4f(5.0, 6.0, 2.1,   0.5),
    vec4f(4.0, 3.0, 3.14,  0.38)
  );

  for(var k=0; k<5; k++){
    let p     = pairs[k];
    let scale = 0.75 + f32(k)*0.04;
    let local = uv / scale;
    let d     = lissajous(local, p.x, p.y, p.z, t*(0.9+f32(k)*0.08));
    let w     = p.w * 0.012 / max(d, 0.0001);
    glow += w * (0.4 + f32(k)*0.12);
  }

  glow = clamp(glow, 0.0, 1.8);

  // Point curseur qui parcourt la première courbe
  let phi_c = fract(t*0.25) * 6.28318;
  let cursor = vec2f(sin(3.0*phi_c), sin(2.0*phi_c)) * 0.75;
  let dc = length(uv - cursor);
  let spot = 0.018 / max(dc, 0.0001);

  let base = vec3f(u.cr, u.cg, u.cb);
  var col  = base * glow;
  col += vec3f(1.0) * clamp(spot * 0.6, 0.0, 1.2);

  // Vignette douce
  let vig = 1.0 - dot(uv*0.5, uv*0.5)*0.4;
  col *= clamp(vig, 0.0, 1.0);

  return vec4f(col, 1.0);
}`;

  const {ub,pip,bg}=fullscreenPipeline(device,fmt,wgsl,32);
  return fpsLoop(ts=>{
    device.queue.writeBuffer(ub,0,new Float32Array([ts*.001,canvas.width,canvas.height,...col,0,0]));
    const enc=device.createCommandEncoder();
    const p=enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}]});
    p.setPipeline(pip);p.setBindGroup(0,bg);p.draw(3);p.end();
    device.queue.submit([enc.finish()]);
  });
}

/* ═══════════════════════════════════════════
   TIER MID — PLASMA
   Fragment shader pur, calculé pixel par pixel
═══════════════════════════════════════════ */
async function renderPlasma(canvas, device, accentColor, ctx, fmt) {
  const col = [parseInt(accentColor.slice(1,3),16)/255, parseInt(accentColor.slice(3,5),16)/255, parseInt(accentColor.slice(5,7),16)/255];
  const wgsl=`
struct U{time:f32,rw:f32,rh:f32,cr:f32,cg:f32,cb:f32,p0:f32,p1:f32}
@group(0)@binding(0) var<uniform> u:U;
@vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{
  let p=array<vec2f,3>(vec2f(-4,-1),vec2f(4,-1),vec2f(0,4));
  return vec4f(p[i],0.0,1.0);
}
@fragment fn fs(@builtin(position) fc:vec4f)->@location(0) vec4f{
  let uv=(fc.xy/vec2f(u.rw,u.rh))*2.0-vec2f(1.0);
  let t=u.time;
  let v1=sin(uv.x*6.0+t);
  let v2=sin(uv.y*6.0+t*.7);
  let v3=sin((uv.x+uv.y)*4.0+t*.9);
  let v4=sin(sqrt(uv.x*uv.x+uv.y*uv.y)*7.0-t*1.2);
  let v5=sin(uv.x*3.0+sin(t+uv.y*4.0));
  let v=(v1+v2+v3+v4+v5)*0.5;
  let n=v*0.5+0.5;
  // Palette basée sur la couleur accent
  let c1=vec3f(u.cr*n, u.cg*n*0.6, u.cb*(1.0-n*0.5));
  let c2=vec3f(n*0.1, n*0.3*u.cb, u.cg*n*0.8);
  let c=mix(c1,c2,sin(v*3.14)*0.5+0.5);
  // Vignette
  let vig=1.0-dot(uv,uv)*.55;
  return vec4f(c*vig,1.0);
}`;
  const {ub,pip,bg}=fullscreenPipeline(device,fmt,wgsl,32);
  return fpsLoop(ts=>{
    device.queue.writeBuffer(ub,0,new Float32Array([ts*.001,canvas.width,canvas.height,...col,0,0]));
    const enc=device.createCommandEncoder();
    const p=enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}]});
    p.setPipeline(pip);p.setBindGroup(0,bg);p.draw(3);p.end();
    device.queue.submit([enc.finish()]);
  });
}

/* ═══════════════════════════════════════════
   TIER HIGH — VORTEX PARTICULES
   Compute + render, 50k particules
═══════════════════════════════════════════ */
async function renderVortex(canvas, device, accentColor, ctx, fmt) {
  const col=[parseInt(accentColor.slice(1,3),16)/255,parseInt(accentColor.slice(3,5),16)/255,parseInt(accentColor.slice(5,7),16)/255];
  const nb=50000;
  const mb=device.createBuffer({size:8,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
  const code=`
struct P{pos:vec2f,vel:vec2f,life:f32,pad:vec3f}
struct M{pos:vec2f}
@group(0)@binding(0) var<storage,read>       pin:array<P>;
@group(0)@binding(1) var<storage,read_write> pout:array<P>;
@group(0)@binding(2) var<uniform> m:M;
@compute @workgroup_size(64)
fn cp(@builtin(global_invocation_id) id:vec3u){
  var p=pin[id.x];
  let d=m.pos-p.pos; let dist=length(d);
  if(dist<0.5&&dist>0.001){p.vel+=normalize(d)*0.00045*(1.0-dist/0.5);}
  let ang=0.00055; let cs=cos(ang); let sn=sin(ang);
  p.vel=vec2f(p.vel.x*cs-p.vel.y*sn,p.vel.x*sn+p.vel.y*cs);
  p.vel*=0.987; p.pos+=p.vel;
  if(p.pos.x<-1.0){p.pos.x=1.0;} if(p.pos.x>1.0){p.pos.x=-1.0;}
  if(p.pos.y<-1.0){p.pos.y=1.0;} if(p.pos.y>1.0){p.pos.y=-1.0;}
  pout[id.x]=p;
}
struct V{@builtin(position) pos:vec4f,@location(0) uv:vec2f,@location(1) col:vec3f}
@vertex fn vs(@builtin(instance_index) i:u32,@builtin(vertex_index) v:u32)->V{
  let p=pin[i]; let s=0.005+length(p.vel)*0.22;
  var uvs=array<vec2f,6>(vec2f(-1,1),vec2f(1,1),vec2f(-1,-1),vec2f(-1,-1),vec2f(1,1),vec2f(1,-1));
  let uv=uvs[v]; let t=clamp(length(p.vel)*60.0,0.0,1.0);
  let c=mix(vec3f(0.10,0.06,0.35+t*.4),vec3f(0.24,0.47,1.0),t);
  return V(vec4f(p.pos+uv*s,0.0,1.0),uv,c);
}
@fragment fn fs(@location(0) uv:vec2f,@location(1) col:vec3f)->@location(0) vec4f{
  let d=length(uv); if(d>1.0){discard;}
  let a=exp(-d*d*6.0)+exp(-d*d*1.8)*0.3;
  return vec4f(col+exp(-d*d*6.0)*0.3,clamp(a,0.0,1.0)*0.8);
}`;
  const mod=device.createShaderModule({code});
  const bufA=device.createBuffer({size:nb*32,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
  const bufB=device.createBuffer({size:nb*32,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
  const init=new Float32Array(nb*8);
  for(let i=0;i<nb*8;i+=8){
    const r=Math.sqrt(Math.random())*.85,a=Math.random()*6.28;
    init[i]=r*Math.cos(a);init[i+1]=r*Math.sin(a);
    init[i+2]=(Math.random()-.5)*.001;init[i+3]=(Math.random()-.5)*.001;
  }
  device.queue.writeBuffer(bufA,0,init);
  const layout=device.createBindGroupLayout({entries:[
    {binding:0,visibility:GPUShaderStage.COMPUTE|GPUShaderStage.VERTEX,buffer:{type:'read-only-storage'}},
    {binding:1,visibility:GPUShaderStage.COMPUTE,buffer:{type:'storage'}},
    {binding:2,visibility:GPUShaderStage.COMPUTE,buffer:{type:'uniform'}}
  ]});
  const pl=device.createPipelineLayout({bindGroupLayouts:[layout]});
  const cp=device.createComputePipeline({layout:pl,compute:{module:mod,entryPoint:'cp'}});
  const rp=device.createRenderPipeline({
    layout:pl,vertex:{module:mod,entryPoint:'vs'},
    fragment:{module:mod,entryPoint:'fs',targets:[{format:fmt,blend:{
      color:{srcFactor:'src-alpha',dstFactor:'one',operation:'add'},
      alpha:{srcFactor:'one',dstFactor:'one-minus-src-alpha',operation:'add'}
    }}]},
    primitive:{topology:'triangle-list'}
  });
  const bgA=device.createBindGroup({layout,entries:[{binding:0,resource:{buffer:bufA}},{binding:1,resource:{buffer:bufB}},{binding:2,resource:{buffer:mb}}]});
  const bgB=device.createBindGroup({layout,entries:[{binding:0,resource:{buffer:bufB}},{binding:1,resource:{buffer:bufA}},{binding:2,resource:{buffer:mb}}]});
  canvas.addEventListener('mousemove',e=>{
    device.queue.writeBuffer(mb,0,new Float32Array([(e.clientX/window.innerWidth)*2-1,-(( e.clientY/window.innerHeight)*2-1)]));
  });
  let step=0,alive=true;
  function frame(ts){
    if(!alive)return;
    const cur=step%2===0?bgA:bgB;
    const enc=device.createCommandEncoder();
    const p1=enc.beginComputePass();p1.setPipeline(cp);p1.setBindGroup(0,cur);p1.dispatchWorkgroups(Math.ceil(nb/64));p1.end();
    const p2=enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0,g:0,b:.02,a:1},loadOp:'clear',storeOp:'store'}]});
    p2.setPipeline(rp);p2.setBindGroup(0,cur);p2.draw(6,nb);p2.end();
    device.queue.submit([enc.finish()]);
    step++;
  }
  return fpsLoop(frame);
}

/* ═══════════════════════════════════════════
   TIER ULTRA — RAY MARCHER 3D
   Scène SDF complète, ombres, AO, reflets
═══════════════════════════════════════════ */
async function renderRaymarcher(canvas, device, accentColor, ctx, fmt) {
  const col=[parseInt(accentColor.slice(1,3),16)/255,parseInt(accentColor.slice(3,5),16)/255,parseInt(accentColor.slice(5,7),16)/255];
  const wgsl=`
struct U{time:f32,mx:f32,my:f32,rw:f32,rh:f32,cr:f32,cg:f32,cb:f32}
@group(0)@binding(0) var<uniform> u:U;
fn sdSphere(p:vec3f,r:f32)->f32{return length(p)-r;}
fn sdBox(p:vec3f,b:f32)->f32{let q=abs(p)-vec3f(b);return length(max(q,vec3f(0)))+min(max(q.x,max(q.y,q.z)),0.0);}
fn sdTorus(p:vec3f,R:f32,r:f32)->f32{return length(vec2f(length(p.xz)-R,p.y))-r;}
fn smin(a:f32,b:f32,k:f32)->f32{let h=max(k-abs(a-b),0.0)/k;return min(a,b)-h*h*k*.25;}
fn map(p:vec3f)->vec2f{
  var d=1000.0;var m=0.0;
  let gd=p.y+1.2; if(gd<d){d=gd;m=1.0;}
  let ta=u.time*.5; var tp=vec3f(p.x*cos(ta)-p.z*sin(ta),p.y,p.x*sin(ta)+p.z*cos(ta));
  let td=sdTorus(tp,.8,.22); if(td<d){d=td;m=2.0;}
  let by=abs(sin(u.time*1.1))*.7-.5;
  let sd=sdSphere(p-vec3f(-1.3,by,.0),.32);
  let sq=sdSphere(p-vec3f(-1.3,-.72,.0),.15+clamp(-by*.35,0.0,.18));
  let bl=smin(sd,sq,.28); if(bl<d){d=bl;m=3.0;}
  for(var i=0u;i<4u;i++){
    let fi=f32(i)*1.5708; let ca=fi+u.time*.42;
    let cb=sdBox(p-vec3f(cos(ca)*1.6,sin(u.time*.85+fi)*.25-.35,sin(ca)*1.6),.13);
    if(cb<d){d=cb;m=4.0;}
  }
  let tops=sdSphere(p-vec3f(0,.5+sin(u.time*2.)*.1,0),.14); if(tops<d){d=tops;m=5.0;}
  return vec2f(d,m);
}
fn calcN(p:vec3f)->vec3f{
  let e=.001;
  return normalize(vec3f(map(p+vec3f(e,0,0)).x-map(p-vec3f(e,0,0)).x,map(p+vec3f(0,e,0)).x-map(p-vec3f(0,e,0)).x,map(p+vec3f(0,0,e)).x-map(p-vec3f(0,0,e)).x));
}
fn shadow(ro:vec3f,rd:vec3f)->f32{
  var res=1.0;var t=.05;
  for(var i=0;i<24;i++){let h=map(ro+rd*t).x;if(h<.001){return .05;}res=min(res,12.*h/t);t+=clamp(h,.015,.3);if(t>8.){break;}}
  return clamp(res,0.,1.);
}
fn ao(p:vec3f,n:vec3f)->f32{
  var o=0.;var w=1.;
  for(var i=1;i<=4;i++){let s=f32(i)*.08;o+=w*(s-map(p+n*s).x);w*=.5;}
  return clamp(1.-2.*o,0.,1.);
}
@vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{
  let p=array<vec2f,3>(vec2f(-4,-1),vec2f(4,-1),vec2f(0,4));return vec4f(p[i],0.,1.);
}
@fragment fn fs(@builtin(position) fc:vec4f)->@location(0) vec4f{
  let res=vec2f(u.rw,u.rh); let uv=(fc.xy*2.-res)/res.y;
  let yaw=u.mx*6.28; let pitch=clamp(u.my*1.4-.3,-1.,0.7); let dist=4.5;
  let ro=vec3f(sin(yaw)*cos(pitch)*dist,sin(pitch)*dist+.1,cos(yaw)*cos(pitch)*dist);
  let fwd=normalize(vec3f(0,-.1,0)-ro);
  let rgt=normalize(cross(vec3f(0,1,0),fwd)); let upv=cross(fwd,rgt);
  let rd=normalize(fwd+uv.x*rgt+uv.y*upv);
  var t=0.;var mat=-1.;
  for(var i=0;i<90;i++){let r=map(ro+rd*t);if(r.x<.0006){mat=r.y;break;}t+=r.x;if(t>28.){break;}}
  var col=vec3f(.02,.015,.05)+max(rd.y,0.)*vec3f(.03,.02,.09);
  let sp=fract(rd.xyz*160.); if(mat<0.&&length(sp-.5)<.025&&rd.y>.05){col+=vec3f(u.cr,u.cg,u.cb)*.5*(0.025-length(sp-.5))*40.;}
  if(mat>=0.){
    let p=ro+rd*t; let n=calcN(p);
    let lig=normalize(vec3f(2.,4.,1.5));
    let diff=max(dot(n,lig),0.); let spec=pow(max(dot(reflect(-lig,n),-rd),0.),64.);
    let shad=shadow(p+n*.005,lig); let occ=ao(p,n);
    let amb=(.05+.04*(n.y*.5+.5))*occ;
    var base:vec3f;
    if(mat<1.5){let c=fract((floor(p.x*1.2)+floor(p.z*1.2))*.5)*2.;base=mix(vec3f(.07,.06,.14),vec3f(.16,.14,.26),c);}
    else if(mat<2.5){base=vec3f(u.cr*.7,u.cg*.2,u.cb);}
    else if(mat<3.5){base=vec3f(.08,.75,.5);}
    else if(mat<4.5){base=vec3f(.9,.35,.05);}
    else{base=vec3f(u.cr,u.cg*.5,u.cb*.8);}
    col=base*(amb+diff*shad); col+=vec3f(.9,.95,1.)*spec*shad*.6;
    col=mix(col,vec3f(.02,.015,.05),1.-exp(-t*.05));
    let rim=pow(1.-max(dot(n,-rd),0.),3.)*.1*occ; col+=base*rim*vec3f(.5,.4,.9);
  }
  col=col/(col+vec3f(.8)); col=pow(max(col,vec3f(0.)),vec3f(.4545));
  return vec4f(col,1.);
}`;
  const {ub,pip,bg}=fullscreenPipeline(device,fmt,wgsl,32);
  let mx=0.3,my=0.35,drag=false,lx=0,ly=0;
  canvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
  window.addEventListener('mouseup',()=>{drag=false;});
  window.addEventListener('mousemove',e=>{
    if(!drag)return;

  });

    device.queue.writeBuffer(ub,0,new Float32Array([ts*.001,mx,my,canvas.width,canvas.height,...col]));

    const p=enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}]});

}
